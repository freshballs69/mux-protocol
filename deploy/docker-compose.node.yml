# Worker NODE (runs on the remote box). 16 asyncio+uvloop workers (one per core)
# + edge-peer that dials the EDGE (on another machine) and all worker sockets.
# The edge(s) run elsewhere. Set EDGES to one or more --edge flags — one per
# edge uplink port (across --procs workers and/or multiple edge VPSes):
#
#   EDGES="--edge 37.27.93.162:5001 --edge 37.27.93.162:5002" MUX_TOKEN=hello \
#     docker compose -f deploy/docker-compose.node.yml up --build
#
# (Single edge: EDGES="--edge host:5001".)
services:
  app:
    build:
      context: ..
      dockerfile: examples/python-app/Dockerfile
    image: mux-app:node
    command: >
      sh -c 'for i in 00 01 02 03 04 05 06 07 08 09 10 11 12 13 14 15; do
        python3 /app/app_async.py /sockets/w$$i.sock W$$i 1 "$$MUX_TOKEN" & done; wait'
    environment:
      MUX_TOKEN: ${MUX_TOKEN:-s3cr3t}
    volumes:
      - /tmp/muxsock:/sockets
    ulimits:
      nofile: { soft: 1048576, hard: 1048576 }

  edge-peer:
    image: gig4ch4d/edge-peer:latest
    command: >
      ${EDGES:?set EDGES=--edge host:5001 [--edge host:5002 ...]}
      --worker /sockets/w00.sock --worker /sockets/w01.sock
      --worker /sockets/w02.sock --worker /sockets/w03.sock
      --worker /sockets/w04.sock --worker /sockets/w05.sock
      --worker /sockets/w06.sock --worker /sockets/w07.sock
      --worker /sockets/w08.sock --worker /sockets/w09.sock
      --worker /sockets/w10.sock --worker /sockets/w11.sock
      --worker /sockets/w12.sock --worker /sockets/w13.sock
      --worker /sockets/w14.sock --worker /sockets/w15.sock
      --token ${MUX_TOKEN:-s3cr3t}
    volumes:
      - /tmp/muxsock:/sockets
    ulimits:
      nofile: { soft: 1048576, hard: 1048576 }
    depends_on:
      - app
