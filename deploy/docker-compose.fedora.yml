# All-in-one stack on ONE host (e.g. the 16-core Fedora box): edge + edge-peer +
# 16 asyncio+uvloop workers, all containers on one Docker network. The
# edge<->edge-peer tunnel is container-to-container on this host (no LAN), and
# loadbench.py drives the edge's published port from the same box.
#
#   MUX_TOKEN=s3cr3t docker compose -f deploy/docker-compose.fedora.yml up -d --build
#   python3 bench/loadbench.py --target 127.0.0.1:8080 -c 4000 -d 12
services:
  edge:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.publish
      target: edge
    image: mux-edge:burst
    command: --accept-port 5000 --mux-port 5001 --token ${MUX_TOKEN:-s3cr3t}
    ports:
      - "8080:5000"
    ulimits:
      nofile: { soft: 1048576, hard: 1048576 }
    # Let the kernel queue a huge SYN/accept burst instead of dropping it.
    sysctls:
      - net.core.somaxconn=65535
      - net.ipv4.tcp_max_syn_backlog=65535

  app:
    build:
      context: ..
      dockerfile: examples/python-app/Dockerfile
    image: mux-app:node
    command: >
      sh -c 'for i in 00 01 02 03 04 05 06 07 08 09 10 11 12 13 14 15; do
        python3 /app/app_async.py /sockets/w$$i.sock W$$i 1 "$$MUX_TOKEN" & done; wait'
    environment:
      MUX_TOKEN: ${MUX_TOKEN:-s3cr3t}
    volumes:
      - sockets:/sockets
    ulimits:
      nofile: { soft: 1048576, hard: 1048576 }

  edge-peer:
    image: gig4ch4d/edge-peer:latest
    command: >
      --connect edge:5001
      --worker /sockets/w00.sock --worker /sockets/w01.sock
      --worker /sockets/w02.sock --worker /sockets/w03.sock
      --worker /sockets/w04.sock --worker /sockets/w05.sock
      --worker /sockets/w06.sock --worker /sockets/w07.sock
      --worker /sockets/w08.sock --worker /sockets/w09.sock
      --worker /sockets/w10.sock --worker /sockets/w11.sock
      --worker /sockets/w12.sock --worker /sockets/w13.sock
      --worker /sockets/w14.sock --worker /sockets/w15.sock
      --token ${MUX_TOKEN:-s3cr3t}
    volumes:
      - sockets:/sockets
    ulimits:
      nofile: { soft: 1048576, hard: 1048576 }
    depends_on:
      - edge
      - app

volumes:
  sockets:
